title: Marigold
url: https://marigold.run
baseurl: ""

description: >
  Private hosting for open-weight HuggingFace models.
  Typed async inference API, declarative workflow engine,
  and evals built from your production data.

api_base: https://api.dev.mdl.bayis.co.uk
waitlist_api_base: https://api.dev.clientlog.bayis.co.uk/v1

plugins:
  - jekyll-sitemap

permalink: /:basename:output_ext

defaults:
  - scope:
      path: ""
      type: posts
    values:
      permalink: /blog/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - dist
