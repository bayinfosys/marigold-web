<!DOCTYPE html>

  <meta name="author" content="Bay Information Systems">

  <link rel="icon" type="image/png" href="/favicon.png">

  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.canonical }}">
  <meta property="og:title" content="{{ page.og_title | default: page.title }}">
  <meta property="og:description" content="{{ page.og_description | default: page.description }}">

  <title>{{ page.title }}</title>

  {% if page.schema %}{{ page.schema }}{% endif %}

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/junction@5/index.css">

  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
</head>
<body>

{% include nav.html %}

{{ content }}

{% include footer.html %}

<script>
function submitWaitlist(source) {
  var email = document.getElementById('wl-' + source).value;
  var note  = document.getElementById('wl-note-' + source);
  if (!email || email.indexOf('@') < 0) return;
  fetch('{{ site.waitlist_api_base }}/users/waitlist', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ project: "marigold", email: email, source: source })
  }).then(function(r) {
    if (r.ok) note.style.display = 'block';
  }).catch(function() { note.style.display = 'block'; });
}
</script>

<script src="https://www.dev.clientlog.bayis.co.uk/clientlog.js"></script>
<script>
  const logger = clientlog.createLogger({
    endpoint: "https://api.dev.clientlog.bayis.co.uk/v1/event",
    project: "marigold/home"
  });
</script>

</body>
</html>
